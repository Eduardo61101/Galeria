<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria Sermiteop</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:black;
    color:white;
}

h1{
    text-align:center;
    padding:20px;
}

.buscador{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
}

input{
    padding:10px;
    width:300px;
    border:none;
    border-radius:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.categorias{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.categorias button{
    background:white;
    color:white;
    background-color: green;
}

#galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.tarjeta{
    background:#111;
    border-radius:15px;
    overflow:hidden;
}

.tarjeta img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.info p{
    margin-bottom:10px;
}

.botones{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.botones a,
.botones button{
    text-decoration:none;
    background:green;
    color:white;
    padding:8px;
    border-radius:8px;
}

#mas{
    display:block;
    margin:20px auto;
}

footer{
    background:white;
    color:black;
    text-align:center;
    padding:20px;
    margin-top:20px;
}
</style>

</head>
<body>

<h1>Galeria Sermiteop</h1>

<div class="buscador">
    <input id="buscar" placeholder="Buscar imágenes...">
    <button onclick="buscarImagenes()">Buscar</button>
</div>

<div class="categorias">
    <button onclick="categoria('animals')">Animales</button>
    <button onclick="categoria('nature')">Naturaleza</button>
    <button onclick="categoria('cars')">Autos</button>
    <button onclick="categoria('city')">Ciudades</button>
    <button onclick="categoria('fantasy')">Fantasía</button>
</div>

<div id="galeria"></div>

<button id="mas" onclick="cargarMas()">Más imágenes</button>

<footer>
CREDITOS: API DE UNSPLASH

<br><br>

© COPYRIGHT Estudio Sermiteop™

</footer>

<script>

const ACCESS_KEY = "i4F4Nu2U3gjjckFK-9VcSx0H0PXHjzlzDtXlmfO0Hps";

let pagina = 1;
let consultaActual = "nature";

async function obtenerFotos(busqueda,pag=1){

    const url =
    `https://api.unsplash.com/search/photos?page=${pag}&per_page=12&query=${encodeURIComponent(busqueda)}&client_id=${ACCESS_KEY}`;

    const respuesta = await fetch(url);
    const datos = await respuesta.json();

    mostrarFotos(datos.results,pag===1);
}

function mostrarFotos(fotos,limpiar){

    const galeria = document.getElementById("galeria");

    if(limpiar){
        galeria.innerHTML = "";
    }

    fotos.forEach(foto=>{

        const tarjeta = document.createElement("div");
        tarjeta.className = "tarjeta";

        tarjeta.innerHTML = `
        <img src="${foto.urls.small}" alt="${foto.alt_description || 'Imagen'}">

        <div class="info">

        <p>
        Foto de
        <a href="${foto.user.links.html}?utm_source=GaleriaSermiteop&utm_medium=referral" target="_blank">
        ${foto.user.name}
        </a>
        en
        <a href="https://unsplash.com/?utm_source=GaleriaSermiteop&utm_medium=referral" target="_blank">
        Unsplash
        </a>
        </p>

        <div class="botones">

        <a href="${foto.user.links.html}?utm_source=GaleriaSermiteop&utm_medium=referral" target="_blank">
        Ver Autor
        </a>

        <button onclick="registrarDescarga('${foto.links.download_location}','${foto.urls.full}')">
        Descargar
        </button>

        </div>

        </div>
        `;

        galeria.appendChild(tarjeta);

    });
}

async function registrarDescarga(downloadLocation, imagenURL){

    try{
        const respuesta = await fetch(downloadLocation,{
            headers:{
                Authorization: `Client-ID ${ACCESS_KEY}`
            }
        });

        console.log("Descarga registrada en Unsplash");

    }catch(error){
        console.error(error);
    }

    try{
        const imagen = await fetch(imagenURL);
        const blob = await imagen.blob();

        const url = URL.createObjectURL(blob);

        const enlace = document.createElement("a");
        enlace.href = url;
        enlace.download = `sermiteop-${Date.now()}.png`;

        document.body.appendChild(enlace);
        enlace.click();

       alert("Imagen descargada correctamente");

        enlace.remove();

        URL.revokeObjectURL(url);

    }catch(error){
        console.error("No se pudo descargar:", error);
    }
}

function buscarImagenes(){

    const texto = document.getElementById("buscar").value.trim();

    if(!texto) return;

    consultaActual = texto;
    pagina = 1;

    obtenerFotos(consultaActual,pagina);
}

function categoria(nombre){

    consultaActual = nombre;
    pagina = 1;

    obtenerFotos(nombre,pagina);
}

function cargarMas(){

    pagina++;

    obtenerFotos(consultaActual,pagina);
}

obtenerFotos("nature");

</script>

</body>
</html>
